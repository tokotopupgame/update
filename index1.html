    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0f1a;
            --card-bg: #161b2c;
            --accent-color: #38bdf8;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --border-color: #2d364d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 50% -20%, #1e293b 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, #0f172a 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 540px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #38bdf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: -1.5px;
        }

        .subtitle {
            color: var(--text-dim);
            margin-bottom: 35px;
            font-size: 1rem;
        }

        .search-container {
            position: sticky;
            top: 20px;
            z-index: 100;
            margin-bottom: 30px;
        }

        .search-wrapper {
            position: relative;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
            border-radius: 16px;
        }

        .search-wrapper svg {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            transition: color 0.3s;
        }

        .search-input {
            width: 100%;
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            padding: 18px 18px 18px 52px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .search-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.15);
            background: #1c233a;
        }

        .search-input:focus + svg {
            color: var(--accent-color);
        }

        .stats-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 5px;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .list {
            display: grid;
            gap: 12px;
            width: 100%;
        }

        .item {
            opacity: 0;
            transform: translateY(10px);
            animation: fadeIn 0.4s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .item a {
            display: flex;
            align-items: center;
            gap: 16px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 16px 20px;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .item a:hover {
            border-color: var(--accent-color);
            background: #1e253d;
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .item-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .item-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .item-name {
            flex: 1;
            text-align: left;
            font-size: 1.05rem;
        }

        .arrow {
            color: var(--text-dim);
            opacity: 0.5;
            transition: transform 0.2s, color 0.2s;
        }

        .item a:hover .arrow {
            transform: translateX(3px);
            color: var(--accent-color);
            opacity: 1;
        }

        mark {
            background: rgba(56, 189, 248, 0.2);
            color: var(--accent-color);
            border-radius: 4px;
            padding: 0 2px;
        }

        .no-result {
            padding: 50px 20px;
            color: var(--text-dim);
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px dashed var(--border-color);
        }

        /* Loading Skeleton */
        .skeleton {
            height: 74px;
            background: var(--card-bg);
            border-radius: 14px;
            position: relative;
            overflow: hidden;
        }
        .skeleton::after {
            content: "";
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            animation: loading 1.5s infinite;
        }
        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .search-input { padding: 15px 15px 15px 48px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Toko Topup Game</h1>
        <p class="subtitle">Direktori Website Topup Aman & Terpercaya</p>

        <div class="search-container">
            <div class="search-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" class="search-input" id="searchInput" placeholder="Cari nama website..." autocomplete="off">
            </div>
        </div>

        <div class="stats-info">
            <span id="countDisplay">Memuat data...</span>
            <span>Update Otomatis</span>
        </div>

        <div class="list" id="siteList">
            <!-- Skeleton Loader -->
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
        </div>
    </div>

    <script>
        let allSites = [];

        function parseCSV(text) {
            const lines = text.trim().split('\n');
            const data = lines.slice(1).map(line => {
                const commaIndex = line.indexOf(',');
                if (commaIndex === -1) return null;
                const name = line.slice(0, commaIndex).trim();
                const link = line.slice(commaIndex + 1).trim();
                return (name && link) ? { name, link } : null;
            }).filter(Boolean);

            // Sorting A-Z berdasarkan Nama
            return data.sort((a, b) => a.name.localeCompare(b.name));
        }

        function getFaviconUrl(link) {
            try {
                const domain = new URL(link).hostname;
                return `https://www.google.com/s2/favicons?domain=${domain}&sz=128`;
            } catch (e) { return ''; }
        }

        function highlightMatch(text, query) {
            if (!query) return text;
            const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return text.replace(regex, '<mark>$1</mark>');
        }

        function renderList(sites, query = '') {
            const list = document.getElementById('siteList');
            const countDisplay = document.getElementById('countDisplay');
            
            countDisplay.innerText = `${sites.length} Website Tersedia`;

            if (sites.length === 0) {
                list.innerHTML = `<div class="no-result">Tidak ditemukan hasil untuk "${query}"</div>`;
                return;
            }

            list.innerHTML = sites.map((site, index) => {
                const iconUrl = getFaviconUrl(site.link);
                const nameHighlighted = highlightMatch(site.name, query.trim());
                // Inisial untuk fallback jika gambar gagal
                const initial = site.name.charAt(0).toUpperCase();

                return `
                    <div class="item" style="animation-delay: ${index * 0.03}s">
                        <a href="${site.link}" target="_blank" rel="noopener">
                            <div class="item-icon">
                                <img src="${iconUrl}" 
                                     alt="${site.name}" 
                                     loading="lazy" 
                                     onerror="this.parentElement.innerHTML='<span style=\'color:var(--accent-color)\'>${initial}</span>'">
                            </div>
                            <span class="item-name">${nameHighlighted}</span>
                            <span class="arrow">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                            </span>
                        </a>
                    </div>
                `;
            }).join('');
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            const filtered = allSites.filter(s => 
                s.name.toLowerCase().includes(q) || 
                s.link.toLowerCase().includes(q)
            );
            renderList(filtered, q);
        });

        // Load Data
        fetch('data.csv')
            .then(res => {
                if (!res.ok) throw new Error('File data.csv tidak ditemukan');
                return res.text();
            })
            .then(text => {
                allSites = parseCSV(text);
                renderList(allSites);
            })
            .catch(err => {
                document.getElementById('siteList').innerHTML = `<p style="color:#f87171">⚠️ Error: ${err.message}</p>`;
            });
    </script>
</body>
</html>
